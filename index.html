<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="logo.png">
        <title>Story Of Flight: The New Beginning</title>
        <script src="script.js" defer></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- Home slide -->
        <section class="slide home">
            <div class="home-left">
                <img class="home-logo" src="logo.png" alt="Story of Flight Logo">
            </div>
            <div class="home-right">
                <h2 class="home-subtitle">Story of Flight:</h2>
                <h1 class="home-title">The New<br>Beginning</h1>
                <p class="home-author">By Kirill McQuillin and Mustafa Imad</p>
            </div>
        </section>

        <!-- Slide 2 --> 
        <section class="slide slide-2">
            <h1>Slide 2</h1>
            <p>Placeholder content</p>
        </section>

        <!-- Slide 3 --> 
        <section class="slide slide-3">
            <h1>Slide 3</h1>
            <p>Placeholder content</p>
        </section>

        <!-- Previous Button -->
        <button class="side-btn prev" id="back" aria-label="Previous slide" title="Previous">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <!-- Example left arrow path -->
                <path d="M15.5 19l-7-7 7-7" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Next Button -->
        <button class="side-btn next" id="next" aria-label="Next slide" title="Next">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <!-- Example right arrow path -->
                <path d="M8.5 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Home Button -->
        <button class="home-btn" id="nav-home" aria-label="Home" title="Home">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                <!-- Example home icon path -->
                <path d="M3 10.5l9-7 9 7V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V10.5z" fill="currentColor"/>
            </svg>
        </button>
    </body>
</html>
